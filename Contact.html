<html>
<head>
<title>Contact - CodeAcademy+</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

.navbar {
    display: flex;
    justify-content: space-between;
    padding: 18px 60px;
    background: #111;
    color: white;
}

.nav-links a {
    color: white;
    margin-left: 25px;
    text-decoration: none;
}

.nav-links a:hover {
    color: #00c6ff;
}

.header {
    padding: 50px;
    text-align: center;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
}

.header h1 {
    font-size: 36px;
}

.contact {
    padding: 60px;
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
}

.contact-form {
    width: 350px;
    display: flex;
    flex-direction: column;
}

.contact-form input,
.contact-form textarea {
    margin-bottom: 15px;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
}

.contact-form button {
    padding: 12px;
    border: none;
    background: #0072ff;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.contact-form button:hover {
    background: #0057cc;
}

.contact-info {
    max-width: 300px;
}

.contact-info h3 {
    margin-bottom: 10px;
}

.contact-info p {
    margin-bottom: 10px;
    color: #555;
}

.footer {
    background: #111;
    color: white;
    text-align: center;
    padding: 20px;
}

</style>

</head>

<body>

<div class="navbar">
    <h2>CodeAcademy+</h2>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="courses.html">Courses</a>
        <a href="about.html">About</a>
        <a href="#">Contact</a>
    </div>
</div>

<div class="header">
    <h1>Contact Us</h1>
    <p>We’d love to hear from you!</p>
</div>

<div class="contact">
    
    <form class="contact-form">
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea rows="5" placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
    </form>
   
    <div class="contact-info">
        <h3>Get in Touch</h3>
        <p>Email: support@CodeAcademy.com</p>
        <p>Phone: +91 98765 43210</p>
        <p>Location: Kolkata, India</p>
        <p>Available: Mon - Fri (9 AM - 6 PM)</p>
    </div>

</div>

<div class="footer">
    <p> 2026 CodeAcademy+ |Created by Suchandra Karmakar</p>
</div>

</body>

</html>
